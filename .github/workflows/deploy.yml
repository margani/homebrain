name: Deploy to PocketHost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pockethost-pb-public
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy static app
    runs-on: ubuntu-latest

    env:
      PUBLIC_POCKETBASE_URL: 'https://db.home.whosane.dev'
      PUBLIC_REPOSITORY_URL: 'https://github.com/${{ github.repository }}'
      PUBLIC_GIT_COMMIT: '${{ github.sha }}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: |
          rm -rf build
          npm run build
          test -f build/index.html

      - name: Stage static build for PocketHost
        run: |
          deploy_dir="$RUNNER_TEMP/homebrain-deploy"
          rm -rf "$deploy_dir"
          mkdir -p "$deploy_dir/pb_public"
          cp -a build/. "$deploy_dir/pb_public/"
          test -f "$deploy_dir/pb_public/index.html"
          echo "DEPLOY_DIR=$deploy_dir" >> "$GITHUB_ENV"

      - name: Install phio CLI
        run: |
          npm install -g tsx phio
          phio --help

      - name: Deploy with phio
        env:
          PHIO_USERNAME: ${{ secrets.PHIO_USERNAME }}
          PHIO_PASSWORD: ${{ secrets.PHIO_PASSWORD }}
          PHIO_INSTANCE: ${{ secrets.PHIO_INSTANCE }}
          PHIO_INSTANCE_NAME: ${{ secrets.PHIO_INSTANCE }}
        run: |
          set -euo pipefail

          : "${PHIO_USERNAME:?Missing PHIO_USERNAME secret}"
          : "${PHIO_PASSWORD:?Missing PHIO_PASSWORD secret}"
          : "${PHIO_INSTANCE:?Missing PHIO_INSTANCE secret}"
          : "${DEPLOY_DIR:?Missing DEPLOY_DIR}"

          cd "$DEPLOY_DIR"
          phio deploy "$PHIO_INSTANCE"
